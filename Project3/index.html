<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Stopwatch</h1>
        <p class="subtitle">Ocean-inspired timing with smart lap analytics</p>

        <div id="display" class="display">00:00:00</div>

        <div class="buttons">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="lapBtn">Lap</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="premium-panel">
            <div class="premium-item">
                <span class="label">Best Lap</span>
                <span id="bestLap">--:--:--</span>
            </div>
            <div class="premium-item">
                <span class="label">Total Laps</span>
                <span id="lapCount">0</span>
            </div>
        </div>

        <ul id="laps"></ul>
    </div>
    <script src="script.js" defer></script>

</body>
</html>
